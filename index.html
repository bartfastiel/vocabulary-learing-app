<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Expires" content="0"/>
    <title>Vokabeltrainer + Raketen-Spiel</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            font-family: "Segoe UI", sans-serif;
        }
        #version {
            position: fixed;
            bottom: 5px;
            right: 10px;
            font-size: 0.8em;
            color: #00000050;
        }
        * {
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
<app-shell></app-shell>

<!-- preload audio for instant playback -->
<audio src="assets/audio/ding.mp3" preload="auto"></audio>
<audio src="assets/audio/buzz.mp3" preload="auto"></audio>

<!-- main entrypoint — cache-busting via timestamp -->
<script>
    const s = document.createElement("script");
    s.type = "module";
    s.src = "./core/app-shell.js?v=" + Date.now();
    document.currentScript.replaceWith(s);
</script>
<div id="version">Entwicklungsversion</div>
</body>
</html>
